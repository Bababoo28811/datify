  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Datify — Supplier Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pink:#FF6B81;--pink-dark:#E8526A;--pink-light:#FFF0F2;--pink-xlight:#FFF8F9;
      --bg:#FFF8F6;--text:#2D2D2D;--muted:#9B8B8E;--border:#EDD9D3;
      --green:#10B981;--red:#EF4444;--purple:#8B5CF6;
      --shadow:0 4px 24px rgba(255,107,129,0.10);
      --shadow-sm:0 2px 12px rgba(255,107,129,0.07);
      --r:20px;--r-sm:12px;--r-lg:28px;
    }
    html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

    /* ── NAV ── */
    .nav{background:rgba(255,248,246,0.97);border-bottom:1px solid var(--border);
         padding:0 32px;height:64px;display:flex;align-items:center;
         justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-mark{width:36px;height:36px;background:var(--pink);border-radius:12px;
                   display:flex;align-items:center;justify-content:center}
    .nav-logo-mark svg{width:20px;height:20px;fill:white}
    .nav-brand{font-size:20px;font-weight:800;color:var(--pink);letter-spacing:-0.5px}
    .nav-badge{background:var(--pink-light);color:var(--pink);font-size:11px;font-weight:700;
               padding:3px 12px;border-radius:100px;letter-spacing:0.4px}
    .nav-right{display:flex;align-items:center;gap:12px}
    .nav-user{font-size:13px;color:var(--muted);font-weight:500}
    .btn-logout{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;
                cursor:pointer;border:1.5px solid var(--border);background:transparent;
                color:var(--text);font-family:'Inter',sans-serif;transition:all 0.15s}
    .btn-logout:hover{border-color:var(--red);color:var(--red)}

    /* ── LAYOUT ── */
    .wrap{max-width:1140px;margin:0 auto;padding:36px 24px}
    .page-head{margin-bottom:32px}
    .page-head h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
    .page-head p{font-size:14px;color:var(--muted)}

    /* ── STATS ── */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:32px}
    .stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);
               padding:18px 20px;box-shadow:var(--shadow-sm)}
    .stat-val{font-size:26px;font-weight:800;color:var(--text)}
    .stat-val.pink{color:var(--pink)}
    .stat-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
              letter-spacing:0.4px;margin-top:4px}

    /* ── GRID ── */
    .dash-grid{display:grid;grid-template-columns:420px 1fr;gap:24px;align-items:start}

    /* ── CARDS ── */
    .card{background:#fff;border:1px solid var(--border);border-radius:var(--r);
          box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:20px}
    .card:last-child{margin-bottom:0}
    .card-head{padding:18px 24px;border-bottom:1px solid var(--border);
               display:flex;align-items:center;justify-content:space-between}
    .card-head h2{font-size:15px;font-weight:700}
    .card-body{padding:24px}

    /* ── FORM ── */
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);
              text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
    .fg input,.fg select,.fg textarea{
      width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;
      font-size:14px;font-family:'Inter',sans-serif;background:var(--bg);
      color:var(--text);outline:none;transition:border-color 0.15s}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pink)}
    .fg textarea{resize:vertical;min-height:72px}
    .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* ── IMAGE UPLOAD ── */
    .img-upload-area{position:relative;width:100%;height:150px;border:2px dashed var(--border);
                     border-radius:14px;background:var(--bg);display:flex;align-items:center;
                     justify-content:center;cursor:pointer;transition:border-color 0.2s;overflow:hidden}
    .img-upload-area:hover{border-color:var(--pink)}
    .img-upload-area.has-img{border-style:solid;border-color:var(--pink)}
    .img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .img-preview{width:100%;height:100%;object-fit:cover;display:none}
    .img-placeholder{pointer-events:none;text-align:center;color:var(--muted)}
    .img-placeholder svg{width:28px;height:28px;stroke:var(--muted);fill:none;margin-bottom:8px}
    .img-placeholder p{font-size:13px;font-weight:600}
    .img-placeholder small{font-size:11px}
    .img-remove-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;
                    background:rgba(0,0,0,0.45);border:none;cursor:pointer;color:white;
                    font-size:15px;display:none;align-items:center;justify-content:center;z-index:2}
    .img-upload-area.has-img .img-remove-btn{display:flex}
    .img-upload-area.has-img .img-placeholder{display:none}
    .img-upload-area.has-img .img-preview{display:block}
    .upload-bar-wrap{height:3px;background:var(--pink-light);border-radius:99px;margin-top:6px;display:none}
    .upload-bar{height:100%;background:var(--pink);border-radius:99px;width:0;transition:width 0.3s}

    /* ── CHECKBOX ── */
    .check-row{display:flex;align-items:center;gap:10px;padding:11px 14px;
               border:1.5px solid var(--border);border-radius:12px;cursor:pointer;
               transition:border-color 0.15s;background:var(--bg)}
    .check-row:hover{border-color:var(--pink)}
    .check-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--pink);cursor:pointer}
    .check-row .cl{font-size:14px;font-weight:600}
    .check-row .cs{font-size:12px;color:var(--muted);margin-left:4px}

    /* ── CATEGORY ADD ── */
    .cat-add-row{display:flex;gap:8px}
    .cat-add-row input{flex:1;padding:10px 14px;border:1.5px solid var(--border);
                       border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;
                       background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s}
    .cat-add-row input:focus{border-color:var(--pink)}

    /* ── BUTTONS ── */
    .btn-primary{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;
                 cursor:pointer;border:none;background:var(--pink);color:white;
                 font-family:'Inter',sans-serif;transition:all 0.18s;margin-top:4px}
    .btn-primary:hover{background:var(--pink-dark)}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed}
    .btn-sm{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
            border:none;background:var(--pink);color:white;font-family:'Inter',sans-serif;
            transition:background 0.15s;white-space:nowrap}
    .btn-sm:hover{background:var(--pink-dark)}
    .btn-sm-outline{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
                    border:1.5px solid var(--border);background:transparent;color:var(--muted);
                    font-family:'Inter',sans-serif;transition:all 0.15s}
    .btn-sm-outline:hover{border-color:var(--pink);color:var(--pink)}
    .btn-sm-danger{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
                   border:1.5px solid var(--border);background:transparent;color:var(--muted);
                   font-family:'Inter',sans-serif;transition:all 0.12s}
    .btn-sm-danger:hover{border-color:var(--red);color:var(--red)}

    /* ── MESSAGES ── */
    .msg{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:500;margin-top:12px;display:none}
    .msg-error{background:#FEE2E2;color:#991B1B}
    .msg-success{background:#DCFCE7;color:#15803D}

    /* ── TABLE ── */
    .table-scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);
       text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg)}
    .deal-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;
                background:var(--pink-light);flex-shrink:0;display:flex;
                align-items:center;justify-content:center;font-size:20px}
    .deal-thumb img{width:44px;height:44px;border-radius:10px;object-fit:cover}
    .status-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
    .status-active{background:#DCFCE7;color:#15803D}
    .status-expired{background:#FEE2E2;color:#991B1B}
    .td-actions{display:flex;gap:6px}

    @media(max-width:900px){
      .dash-grid{grid-template-columns:1fr}
      .nav{padding:0 16px}
      .wrap{padding:24px 14px}
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
    </div>
    <span class="nav-brand">Datify</span>
  </a>
  <span class="nav-badge">Supplier Dashboard</span>
  <div class="nav-right">
    <span class="nav-user" id="nav-user-email"></span>
    <button class="btn-logout" onclick="supplierLogout()">Sign out</button>
  </div>
</nav>

<div class="wrap">
  <div class="page-head">
    <h1>Supplier Dashboard</h1>
    <p>Manage your deals, categories and listings</p>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val pink" id="stat-active">—</div><div class="stat-lbl">Active deals</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total deals</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-expired">—</div><div class="stat-lbl">Expired</div></div>
  </div>

  <div class="dash-grid">

    <!-- LEFT COL -->
    <div>

      <!-- ADD CATEGORY -->
      <div class="card">
        <div class="card-head"><h2>Categories</h2></div>
        <div class="card-body">
          <div class="cat-add-row">
            <input id="new-cat-input" type="text" placeholder="e.g. Wellness, Outdoor…">
            <button class="btn-sm" onclick="addCategory()">Add</button>
          </div>
          <div id="cat-msg" class="msg"></div>
          <div id="cat-chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px"></div>
        </div>
      </div>

      <!-- ADD / EDIT DEAL -->
      <div class="card">
        <div class="card-head">
          <h2 id="form-heading">Add New Deal</h2>
          <button class="btn-sm-outline" id="cancel-edit-btn" style="display:none" onclick="cancelEdit()">Cancel</button>
        </div>
        <div class="card-body">
          <form id="deal-form" onsubmit="submitDeal(event)">
            <input type="hidden" id="editing-id">

            <!-- IMAGE -->
            <div class="fg">
              <label>Deal Image</label>
              <div class="img-upload-area" id="img-area">
                <input type="file" id="img-input" accept="image/*" onchange="previewImg(this)">
                <img class="img-preview" id="img-preview" src="" alt="">
                <button type="button" class="img-remove-btn" onclick="removeImg(event)">×</button>
                <div class="img-placeholder">
                  <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                  <p>Click to upload image</p>
                  <small>JPG, PNG, WEBP — max 5 MB</small>
                </div>
              </div>
              <div class="upload-bar-wrap" id="upload-bar-wrap">
                <div class="upload-bar" id="upload-bar"></div>
              </div>
              <input type="hidden" id="img-url-input">
            </div>

            <div class="fg">
              <label>Title *</label>
              <input id="f-title" type="text" placeholder="e.g. Sunset Dinner for Two" required>
            </div>
            <div class="fg">
              <label>Description</label>
              <textarea id="f-desc" placeholder="What's included, restrictions, highlights…"></textarea>
            </div>

            <div class="fg-row">
              <div class="fg">
                <label>Price ($) *</label>
                <input id="f-price" type="number" min="0" step="0.01" placeholder="0.00" required>
              </div>
              <div class="fg">
                <label>Original Price ($)</label>
                <input id="f-orig-price" type="number" min="0" step="0.01" placeholder="0.00">
              </div>
            </div>

            <div class="fg">
              <label>Location</label>
              <input id="f-location" type="text" placeholder="e.g. Clarke Quay, Singapore">
            </div>

            <div class="fg-row">
              <div class="fg">
                <label>Category</label>
                <select id="f-category">
                  <option value="">Select…</option>
                </select>
              </div>
              <div class="fg">
                <label>Vibe</label>
                <select id="f-vibe">
                  <option value="">Select…</option>
                  <option>Romantic</option>
                  <option>Fun</option>
                  <option>Adventurous</option>
                  <option>Chill</option>
                  <option>Foodie</option>
                </select>
              </div>
            </div>

            <div class="fg">
              <label>Activity Type</label>
              <input id="f-activity" type="text" placeholder="e.g. Dining, Cruise, Workshop">
            </div>

            <div class="fg-row">
              <div class="fg">
                <label>Start Date</label>
                <input id="f-start-date" type="date">
              </div>
              <div class="fg" id="end-date-wrap">
                <label>End Date</label>
                <input id="f-end-date" type="date">
              </div>
            </div>

            <div class="fg">
              <label style="margin-bottom:8px">Ongoing Deal</label>
              <label class="check-row">
                <input type="checkbox" id="f-ongoing" onchange="toggleOngoing(this)">
                <span class="cl">No end date</span>
                <span class="cs">— active till further notice</span>
              </label>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">Add Deal</button>
            <div id="form-msg" class="msg"></div>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT COL: MY DEALS TABLE -->
    <div class="card" style="margin-bottom:0">
      <div class="card-head">
        <h2>My Deals</h2>
        <button class="btn-sm" onclick="loadMyDeals()" style="font-size:12px;padding:6px 14px">Refresh</button>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Img</th>
              <th>Title</th>
              <th>Category</th>
              <th>Price</th>
              <th>Ends</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="deals-tbody">
            <tr><td colspan="7" style="text-align:center;padding:28px;color:var(--muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="table-msg" class="msg" style="margin:0 24px 16px"></div>
    </div>

  </div>
</div>

<script src="supabase.js"></script>
<script src="supplier.js"></script>
</body>
</html>
